<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Verify your Logios Brain account</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 480px; margin: 40px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header { background: #2d3748; color: white; padding: 24px; text-align: center; }
    .header h1 { margin: 0; font-size: 20px; }
    .body { padding: 32px 24px; }
    .otp { font-size: 32px; letter-spacing: 8px; text-align: center; color: #2d3748; font-weight: bold; margin: 24px 0; }
    .note { font-size: 13px; color: #718096; text-align: center; }
    .footer { padding: 16px 24px; background: #f7fafc; font-size: 12px; color: #a0aec0; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Logios Brain</h1>
    </div>
    <div class="body">
      <p>Your verification code is:</p>
      <div class="otp">{{ otp }}</div>
      <p class="note">This code expires in 10 minutes. Do not share it with anyone.</p>
    </div>
    <div class="footer">
      If you did not request this, you can safely ignore this email.
    </div>
  </div>
</body>
</html>

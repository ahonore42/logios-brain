name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r server/requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff format server/ scripts/
          ruff check server/ scripts/ --fix

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy server/ --ignore-missing-imports

      - name: Test import chain
        run: python -c "from server.main import app"

      - name: Verify no missing imports in tools
        run: |
          python -c "
from server.db import postgres, supabase, qdrant, neo4j_client
from server import embeddings, entity_extraction
from server.tools import remember, search, relate, run_skill, get_evidence
print('All imports OK')
"